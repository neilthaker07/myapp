spring.application.name=myapp

# Active profile — controls which BookRepository implementation Spring uses
# "memory" = InMemoryBookRepository (HashMap, no DB needed)
# "postgres" = PostgresBookRepository (requires PostgreSQL running)
spring.profiles.active=postgres

# ---- PostgreSQL config (switch profile to "postgres" to activate) ----
 spring.datasource.url=jdbc:postgresql://localhost:5432/library
 spring.datasource.username=postgres
 spring.datasource.password=postgres
 spring.jpa.hibernate.ddl-auto=create-drop
 spring.jpa.show-sql=true
